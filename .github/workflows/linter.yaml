name: autolinter
on:
  push:
    paths:
      - "*.py"

permissions:
  contents: read
  actions: read        # ← Required to download/access external actions

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Linter
        run: pip install ruff

      - name: Run Linter
        run: ruff check .
